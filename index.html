<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Formación Ciudadana - Colegio Concepción Hualqui</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0B2545; 
            --accent-color: #C5A028;  
            --secondary-bg: #EEF4F8;
            --text-dark: #1D2A44;
            --border-radius: 8px;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #F4F7FA;
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        .navbar {
            background-color: var(--primary-color);
            color: white;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            position: relative;
        }

        .navbar h1 {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
        }

        .navbar p {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            color: #A5C4D4;
        }

        .nav-btn {
            position: absolute;
            right: 20px;
            top: 22px;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background: var(--accent-color);
            color: var(--primary-color);
        }

        @media (max-width: 768px) {
            .navbar { padding-bottom: 60px; }
            .nav-btn { position: relative; display: inline-block; top: 10px; right: 0; }
        }

        .main-container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .info-card {
            background: white;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 25px;
            border-left: 5px solid var(--accent-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .info-card p { margin: 0 0 10px 0; font-size: 0.95rem; }
        .info-card a { color: var(--primary-color); font-weight: 600; text-decoration: none; }
        .info-card a:hover { text-decoration: underline; }

        form {
            background: white;
            padding: 35px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .form-section {
            margin-bottom: 30px;
            border-bottom: 1px solid #E2E8F0;
            padding-bottom: 20px;
        }

        .section-heading {
            font-family: 'Montserrat', sans-serif;
            color: var(--primary-color);
            font-size: 1.2rem;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; gap: 0; }
        }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.95rem; }

        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #CBD5E1;
            border-radius: var(--border-radius);
            box-sizing: border-box;
            font-family: inherit;
        }

        .checkbox-group {
            background-color: var(--secondary-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            display: grid;
            gap: 12px;
        }

        .checkbox-label { display: flex; align-items: flex-start; cursor: pointer; font-size: 0.95rem; }
        .checkbox-label input { margin-top: 4px; margin-right: 12px; }

            font-family: 'Montserrat', sans-serif;
